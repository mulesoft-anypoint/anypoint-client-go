openapi: 3.0.0
info:
  description: Description of the Private Space API
  title: Private Space API
  version: 1.0.1
servers:
- description: Anypoint Cloudhub
  url: https://anypoint.mulesoft.com/runtimefabric/api
- description: Anypoint Cloudhub EU
  url: https://eu1.anypoint.mulesoft.com/runtimefabric/api
- description: Anypoint Cloudhub GOV
  url: https://gov.anypoint.mulesoft.com/runtimefabric/api
security:
- bearerAuth: []
paths:
  /organizations/{orgId}/privatespaces:
    get:
      description: retrieves private spaces for the given organization
      operationId: getPrivateSpaces
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      - description: The offset specifies the offset of the first row to return
        explode: true
        in: query
        name: offset
        required: false
        schema:
          type: integer
        style: form
      - description: Amount of objects retrieved in the response
        explode: true
        in: query
        name: limit
        required: false
        schema:
          type: integer
        style: form
      - description: Property to sort by
        explode: true
        in: query
        name: sort
        required: false
        schema:
          type: string
        style: form
      - description: Order for sorting
        explode: true
        in: query
        name: ascending
        required: false
        schema:
          type: string
        style: form
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "415":
          description: Unsupported media type
        "429":
          description: Too many requests
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateSpaceSummary'
          description: List of private spaces
    post:
      description: creates a private space for the given organization
      operationId: createPrivateSpace
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivateSpacePostBody'
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "400":
          description: Bad request
        "409":
          description: Conflict
        "415":
          description: Unsupported media type
        "429":
          description: Too many requests
        "404":
          description: Not found
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateSpace'
          description: Private space created
  /organizations/{orgId}/privatespaces/{privateSpaceId}:
    delete:
      description: deletes a private space for the given organization
      operationId: deletePrivateSpace
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      - description: The ID of the private space in GUID format
        explode: false
        in: path
        name: privateSpaceId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "404":
          description: Not found
        "204":
          description: Private space deleted
    get:
      description: retrieves a private space for the given organization
      operationId: getPrivateSpace
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      - description: The ID of the private space in GUID format
        explode: false
        in: path
        name: privateSpaceId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "404":
          description: Not found
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateSpace'
          description: Private space details
    patch:
      description: updates a private space for the given organization
      operationId: updatePrivateSpace
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      - description: The ID of the private space in GUID format
        explode: false
        in: path
        name: privateSpaceId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivateSpacePatchBody'
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "404":
          description: Not found
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateSpace'
          description: Private space updated
  /organizations/{orgId}/privatespaces/{privateSpaceId}/iamroles:
    get:
      description: gets the IAM roles for the given private space
      operationId: getPrivateSpaceIamRoles
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      - description: The ID of the private space in GUID format
        explode: false
        in: path
        name: privateSpaceId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "404":
          description: Not found
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateSpaceIamRoles'
          description: IAM roles for the given private space
  /organizations/{orgId}/privatespaces/{privateSpaceId}/transitgateways:
    get:
      description: lists transit gateway attachments for the given private space
      operationId: getPrivateSpaceTransitGateways
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      - description: The ID of the private space in GUID format
        explode: false
        in: path
        name: privateSpaceId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "404":
          description: Not found
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TransitGateway'
                type: array
          description: List of transit gateways
    post:
      description: creates a transit gateway attachment on the given private space
      operationId: createPrivateSpaceTransitGateway
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      - description: The ID of the private space in GUID format
        explode: false
        in: path
        name: privateSpaceId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitGatewayPostBody'
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "400":
          description: Bad request
        "404":
          description: Not found
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransitGateway'
          description: Transit gateway attachment created
  /organizations/{orgId}/privatespaces/{privateSpaceId}/transitgateways/{transitGatewayId}:
    delete:
      description: deletes a transit gateway attachment from the given private space
      operationId: deletePrivateSpaceTransitGateway
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      - description: The ID of the private space in GUID format
        explode: false
        in: path
        name: privateSpaceId
        required: true
        schema:
          type: string
        style: simple
      - description: The transit gateway id (AWS tgw-...).
        explode: false
        in: path
        name: transitGatewayId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "404":
          description: Not found
        "204":
          description: Transit gateway attachment deleted
    patch:
      description: updates the static routes of a transit gateway attachment
      operationId: updatePrivateSpaceTransitGatewayRoutes
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      - description: The ID of the private space in GUID format
        explode: false
        in: path
        name: privateSpaceId
        required: true
        schema:
          type: string
        style: simple
      - description: The transit gateway id (AWS tgw-...).
        explode: false
        in: path
        name: transitGatewayId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitGatewayPatchRoutesBody'
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "400":
          description: Bad request
        "404":
          description: Not found
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TransitGatewayPatchRoutesResult'
                type: array
          description: Transit gateway routes updated (truncated array wrap)
  /organizations/{orgId}/transitgateways:
    get:
      description: "lists transit gateways across the organization, optionally filtered\
        \ by region and private space id"
      operationId: getOrgTransitGateways
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      - description: AWS region filter.
        explode: true
        in: query
        name: region
        required: false
        schema:
          type: string
        style: form
      - description: Private space id filter (GUID).
        explode: true
        in: query
        name: privateSpaceId
        required: false
        schema:
          type: string
        style: form
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TransitGateway'
                type: array
          description: List of transit gateways
  /organizations/{orgId}/transitgateways/{transitGatewayId}:
    patch:
      description: updates the name of a transit gateway
      operationId: updateOrgTransitGatewayName
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      - description: The transit gateway id (AWS tgw-...).
        explode: false
        in: path
        name: transitGatewayId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitGatewayPatchNameBody'
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "400":
          description: Bad request
        "404":
          description: Not found
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TransitGateway'
                type: array
          description: Transit gateway name updated (full array wrap)
  /organizations/{orgId}/privatespaces/{privateSpaceId}/accounts:
    get:
      description: returns the MuleSoft AWS account id (region-bound to the private
        space) to whitelist as RAM share principal
      operationId: getPrivateSpaceMulesoftAccount
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      - description: The ID of the private space in GUID format
        explode: false
        in: path
        name: privateSpaceId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "404":
          description: Not found
        "200":
          content:
            application/json:
              schema:
                type: string
          description: "MuleSoft AWS account id, region-bound (raw string body)"
  /organizations/{orgId}/privatespaces/{privateSpaceId}/routes:
    get:
      description: lists static routes for the private space network
      operationId: getPrivateSpaceRoutes
      parameters:
      - description: The ID of the organization in GUID format
        explode: false
        in: path
        name: orgId
        required: true
        schema:
          type: string
        style: simple
      - description: The ID of the private space in GUID format
        explode: false
        in: path
        name: privateSpaceId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "401":
          description: Access token is missing or invalid
        "403":
          description: Forbidden
        "404":
          description: Not found
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/PrivateSpaceRoute'
                type: array
          description: Private space route table
components:
  responses:
    UnauthorizedError:
      description: Access token is missing or invalid
    ForbiddenError:
      description: Forbidden
    BadRequestError:
      description: Bad request
    NotFoundError:
      description: Not found
    ConflictError:
      description: Conflict
    UnsupportedMediaTypeError:
      description: Unsupported media type
    TooManyRequestsError:
      description: Too many requests
    SuccessListPrivateSpaces:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PrivateSpaceSummary'
      description: List of private spaces
    SuccessCreatePrivateSpace:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PrivateSpace'
      description: Private space created
    SuccessGetPrivateSpace:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PrivateSpace'
      description: Private space details
    SuccessUpdatePrivateSpace:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PrivateSpace'
      description: Private space updated
    SuccessDeletePrivateSpace:
      description: Private space deleted
    SuccessGetPrivateSpaceIamRoles:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PrivateSpaceIamRoles'
      description: IAM roles for the given private space
    SuccessListTransitGateways:
      content:
        application/json:
          schema:
            items:
              $ref: '#/components/schemas/TransitGateway'
            type: array
      description: List of transit gateways
    SuccessCreateTransitGateway:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TransitGateway'
      description: Transit gateway attachment created
    SuccessUpdateTransitGatewayRoutes:
      content:
        application/json:
          schema:
            items:
              $ref: '#/components/schemas/TransitGatewayPatchRoutesResult'
            type: array
      description: Transit gateway routes updated (truncated array wrap)
    SuccessUpdateTransitGatewayName:
      content:
        application/json:
          schema:
            items:
              $ref: '#/components/schemas/TransitGateway'
            type: array
      description: Transit gateway name updated (full array wrap)
    SuccessGetPrivateSpaceMulesoftAccount:
      content:
        application/json:
          schema:
            type: string
      description: "MuleSoft AWS account id, region-bound (raw string body)"
    SuccessListPrivateSpaceRoutes:
      content:
        application/json:
          schema:
            items:
              $ref: '#/components/schemas/PrivateSpaceRoute'
            type: array
      description: Private space route table
  schemas:
    PrivateSpaceSummary:
      example:
        number: 7
        last: true
        size: 2
        numberOfElements: 9
        totalPages: 5
        pageable:
          paged: true
          pageNumber: 0
          offset: 6
          pageSize: 1
          unpaged: true
          sort:
            unsorted: true
            sorted: true
            empty: true
        sort:
          unsorted: true
          sorted: true
          empty: true
        content:
        - organizationId: organizationId
          name: name
          id: id
          rootOrganizationId: rootOrganizationId
          status: status
        - organizationId: organizationId
          name: name
          id: id
          rootOrganizationId: rootOrganizationId
          status: status
        first: true
        totalElements: 5
        empty: true
      properties:
        content:
          items:
            $ref: '#/components/schemas/PrivateSpaceSummaryContentItem'
          type: array
        pageable:
          $ref: '#/components/schemas/PrivateSpaceSummary_pageable'
        last:
          type: boolean
        totalElements:
          type: integer
        totalPages:
          type: integer
        first:
          type: boolean
        size:
          type: integer
        number:
          type: integer
        sort:
          $ref: '#/components/schemas/PrivateSpaceSummary_pageable_sort'
        numberOfElements:
          type: integer
        empty:
          type: boolean
      type: object
    PrivateSpace:
      example:
        globalSpaceStatus:
          cluster:
          - ingress:
              lastSeenTimeStamp: 5
              message: message
              status: status
            fabric:
              lastSeenTimeStamp: 5
              message: message
              status: status
            infra:
              lastSeenTimeStamp: 5
              message: message
              status: status
          - ingress:
              lastSeenTimeStamp: 5
              message: message
              status: status
            fabric:
              lastSeenTimeStamp: 5
              message: message
              status: status
            infra:
              lastSeenTimeStamp: 5
              message: message
              status: status
          space:
            lastSeenTimeStamp: 5
            message: message
            status: status
          network:
            lastSeenTimeStamp: 5
            message: message
            status: status
        daysLeftForRelaxedQuota: 7
        environments:
          type: type
          businessGroups:
          - businessGroups
          - businessGroups
        muleAppDeploymentCount: 2
        enableNetworkIsolation: true
        enableEgress: true
        vpcMigrationInProgress: true
        version: version
        statusMessage: statusMessage
        network:
          inboundStaticIps:
          - inboundStaticIps
          - inboundStaticIps
          reservedCidrs:
          - reservedCidrs
          - reservedCidrs
          internalDns:
            specialDomains:
            - specialDomains
            - specialDomains
            dnsServers:
            - dnsServers
            - dnsServers
          dnsTarget: dnsTarget
          cidrBlock: cidrBlock
          outboundStaticIps:
          - outboundStaticIps
          - outboundStaticIps
          internalDnsTarget: internalDnsTarget
          region: region
        organizationId: organizationId
        name: name
        provisioning:
          message: message
          status: status
        id: id
        region: region
        firewallRules:
        - protocol: protocol
          fromPort: 0
          cidrBlock: cidrBlock
          toPort: 6
          type: type
        - protocol: protocol
          fromPort: 0
          cidrBlock: cidrBlock
          toPort: 6
          type: type
        rootOrganizationId: rootOrganizationId
        ingressConfiguration:
          protocol: protocol
          readResponseTimeout: 1
          logs:
            portLogLevel: portLogLevel
            filters:
            - level: level
              ip: ip
            - level: level
              ip: ip
          deployment:
            lastSeenTimestamp: 5
            status: status
        status: status
        enableIAMRole: true
      properties:
        id:
          description: The ID of the private space in GUID format.
          type: string
        name:
          description: The name of the private space.
          type: string
        version:
          description: The version of the private space.
          type: string
        organizationId:
          description: The ID of the organization in GUID format.
          type: string
        rootOrganizationId:
          description: The root organization ID of the private space in GUID format.
          type: string
        status:
          description: The status of the private space.
          type: string
        statusMessage:
          description: The last reported infra status message.
          type: string
        provisioning:
          $ref: '#/components/schemas/PrivateSpace_provisioning'
        region:
          description: The region of the private space.
          type: string
        environments:
          $ref: '#/components/schemas/PrivateSpaceAssociatedEnvironments'
        network:
          $ref: '#/components/schemas/PrivateSpaceNetwork'
        firewallRules:
          description: The list of firewall rules for the Private Space network.
          items:
            $ref: '#/components/schemas/FirewallRule'
          type: array
        ingressConfiguration:
          $ref: '#/components/schemas/IngressConfiguration'
        enableIAMRole:
          description: "If true, application deployed to this space will have the\
            \ Private Space IAM role attached to the service account."
          type: boolean
        enableEgress:
          description: "If true, egress is enabled for the private space."
          type: boolean
        enableNetworkIsolation:
          description: "If true, network isolation is enabled for the private space."
          type: boolean
        globalSpaceStatus:
          $ref: '#/components/schemas/GlobalSpaceStatus'
        muleAppDeploymentCount:
          description: The number of MuleSoft applications deployed to the private
            space.
          type: integer
        daysLeftForRelaxedQuota:
          description: The number of days left for the relaxed quota.
          type: integer
        vpcMigrationInProgress:
          description: "If true, a VPC migration is in progress for the private space."
          type: boolean
      title: PrivateSpace
      type: object
    PrivateSpaceIamRoles:
      example:
        organizationId: organizationId
        spaceId: spaceId
        roles:
        - roles
        - roles
      properties:
        roles:
          items:
            description: The IAM role.
            type: string
          type: array
        organizationId:
          description: The ID of the organization in GUID format.
          type: string
        spaceId:
          description: The ID of the private space in GUID format.
          type: string
      type: object
    PrivateSpacePostBody:
      example:
        environments:
          type: type
          businessGroups:
          - businessGroups
          - businessGroups
        name: name
        firewallRules:
        - protocol: protocol
          fromPort: 0
          cidrBlock: cidrBlock
          toPort: 6
          type: type
        - protocol: protocol
          fromPort: 0
          cidrBlock: cidrBlock
          toPort: 6
          type: type
        network:
          reservedCidrs:
          - 192.168.0.0/16
          - 172.16.0.0/12
          internalDns:
            specialDomains:
            - specialDomains
            - specialDomains
            dnsServers:
            - dnsServers
            - dnsServers
          cidrBlock: cidrBlock
          region: region
      properties:
        name:
          description: The name of the private space.
          type: string
        environments:
          $ref: '#/components/schemas/PrivateSpaceAssociatedEnvironments'
        network:
          $ref: '#/components/schemas/PrivateSpaceNetworkCreate'
        firewallRules:
          description: The list of firewall rules for the Private Space network.
          items:
            $ref: '#/components/schemas/FirewallRule'
          type: array
      title: PrivateSpacePostBody
      type: object
    PrivateSpacePatchBody:
      example:
        environments:
          type: type
          businessGroups:
          - businessGroups
          - businessGroups
        logForwarding:
          anypointMonitoring: true
        enableNetworkIsolation: true
        enableEgress: true
        firewallRules:
        - protocol: protocol
          fromPort: 0
          cidrBlock: cidrBlock
          toPort: 6
          type: type
        - protocol: protocol
          fromPort: 0
          cidrBlock: cidrBlock
          toPort: 6
          type: type
        ingressConfiguration:
          protocol: protocol
          readResponseTimeout: 1
          logs:
            portLogLevel: portLogLevel
            filters:
            - level: level
              ip: ip
            - level: level
              ip: ip
          deployment:
            lastSeenTimestamp: 5
            status: status
        network:
          reservedCidrs:
          - 192.168.0.0/16
          - 172.16.0.0/12
          internalDns:
            specialDomains:
            - specialDomains
            - specialDomains
            dnsServers:
            - dnsServers
            - dnsServers
        enableIAMRole: true
      properties:
        environments:
          $ref: '#/components/schemas/PrivateSpaceAssociatedEnvironments'
        network:
          $ref: '#/components/schemas/PrivateSpaceNetworkEditable'
        firewallRules:
          description: The list of firewall rules for the Private Space network.
          items:
            $ref: '#/components/schemas/FirewallRule'
          type: array
        logForwarding:
          $ref: '#/components/schemas/PrivateSpacePatchBody_logForwarding'
        ingressConfiguration:
          $ref: '#/components/schemas/IngressConfiguration'
        enableIAMRole:
          description: "If true, application deployed to this space will have the\
            \ Private Space IAM role attached to the service account."
          type: boolean
        enableEgress:
          description: "If true, egress is enabled for the private space."
